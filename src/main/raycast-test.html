<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The City Raycaster - Remake</title>
    <link rel="stylesheet" href="raycast-test.css">
    <script type="module" src="./raycast-example.js"></script>
</head>
<body>
    <div id="gameContainer">
        <div id="title">THE CITY</div>
        <div><span id="status"></span><span id="fps"></span><span id="foo"></span></div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div id="controls">
            <div>CONTROLS:</div>
            <div>
                <span class="key">W</span><span class="key">↑</span> Move Forward | 
                <span class="key">S</span><span class="key">↓</span> Move Backward | 
                <span class="key">A</span><span class="key">←</span> Strafe Left | 
                <span class="key">D</span><span class="key">→</span> Strafe Right | 
                <span class="key">SPACE</span> Jump
            </div>
        </div>

        <div id="bottom"><span id="description"></span></div>
    </div>
</body>
</html>
