<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>arjs - Alternate Reality for the web - Test page</title>
    <link rel="icon" href="../ar-icon-48x48.png" type="image/png" sizes="48x48">
	<link rel="icon" href="../ar-icon-192x192.png" type="image/png" sizes="192x192">
	<link rel="icon" href="../ar-icon-512x512.png" type="image/png" sizes="512x512">
</head>
<body>
    <style type="text/css">
        @font-face {
            font-family: "AlternateRealityTheDungeon";
            src: url("../font/AlternateRealityTheDungeon.woff");
        }

        * {
            font-family: "AlternateRealityTheDungeon", serif
        }

        body, html {
            position: relative; /* Needed for absolute positioning inside */
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #Display {
            position: fixed;
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 70px);
            bottom: 10px;

            border: 2px solid #a0a0e0;
        }
    </style>

    <table>
        <tr>
            <td><label for="Source">Source</label></td>
            <td><select id="Source" disabled><option value="">Select...</option></select></td>

            <td><label for="Scale">Scale</label></td>
            <td><input id="Scale" type="text" value="100"> %</td>
        </tr>
        <tr>
            <td><label for="PositionX">X</label></td>
            <td><input id="PositionX" type="text" value="0"></td>

            <td><label for="PositionY">Y</label></td>
            <td><input id="PositionY" type="text" value="0"></td>
        </tr>
    </table>

    <canvas id="Display"></canvas>

	<script type="module" src="./map.js"></script>
</body>
</html>
