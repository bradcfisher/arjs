<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>AR Dungeon File Extractor</title>
	<link rel="icon" href="../ar-icon-48x48.png" type="image/png" sizes="48x48">
	<link rel="icon" href="../ar-icon-192x192.png" type="image/png" sizes="192x192">
	<link rel="icon" href="../ar-icon-512x512.png" type="image/png" sizes="512x512">
</head>
<body>
    <style type="text/css">
        @font-face {
            font-family: "AlternateRealityTheDungeon";
            src: url("../font/AlternateRealityTheDungeon.woff");
        }

        * {
            font-family: "AlternateRealityTheDungeon", serif
        }

        #byteOutput {
            font-family: monospace
        }
    </style>

    <div class="collapsable">
        <div class="title">File Selection</div>
        <div class="content">
            <div>
                <select id="diskSelect">
                    <option value="../AR/dungeon/disks/Dungeon11.xfd">Disk 1 Side 1</option>
                    <option value="../AR/dungeon/disks/Dungeon21.xfd">Disk 2 Side 1</option>
                    <option value="../AR/dungeon/disks/Dungeon22.xfd">Disk 2 Side 2</option>
                    <option value="../AR/dungeon/disks/Dungeon31.xfd">Disk 3 Side 1</option>
                    <option value="../AR/dungeon/disks/Dungeon32.xfd">Disk 3 Side 2</option>
                </select>

                <select id="fileSelect"></select>

                <input type="button" id="loadButton" value="Load"/>
            </div>
            <div>
                <label>Sector <input id="sectorInput" size=5 /></label>
                <label>Length <input id="lengthInput" size=5 /></label>

                <select id="decryptSelect">
                    <option value="normal">Normal Decrypt</option>
                    <option value="raw">Raw (No Decrypt)</option>
                    <option value="custom">Custom Key</option>
                </select>

                <label id="keySectorLabel" style="display:none">Key Sector <input id="keySectorInput" type="input" size="5"/></label>
                <label id="customKeyLabel" style="display:none">Key <input id="customKeyInput" type="input" size="28" value="00000000000000000000000000000000"/></label>
            </div>
        </div>
    </div>

    <div class="collapsable">
        <div class="title">Base64</div>
        <div class="content">
            <div>
                <span id="fileName"></span>
                <span id="fileInfo"></span>
            </div>
            <div>
                File Id <span id="fileId"></span>
                Checksum <span id="checksum"></span>
                <label>Offset <input id="checksumOffsetInput" value="0" size="5"/></label>
                <label>Length <input id="checksumLengthInput" size="5"/></label>
            </div>

            <div>
                <input type="button" id="saveButton" value="Save"/>
                <textarea id="base64Output" cols="80" rows="5" spellcheck="false"></textarea>
            </div>
        </div>
    </div>

    <div class="collapsable">
        <div class="title">Byte Dump</div>
        <div class="content">
            <div>
                <select id="segmentSelect"></select>
            </div>
            <div>
                <label>Offset <input id="byteOutputOffset" type="text" size="5" value="0"/></label>
                <label>Length <input id="byteOutputLength" type="text" size="5"/></label>

                <label>Mode <select id="dumpModeSelect">
                    <option value="dump">Dump</option>
                    <option value="disassemble">Disassemble</option>
                </select></label>

                <span id="dumpOptions" style="display:none">
                    <label>Columns <input id="byteOutputColumns" type="text" size="5" value="16"/></label>
                    <label>Radix <select id="byteOutputRadix">
                        <option value="16">16 - Hex</option>
                        <option value="10">10 - Decimal</option>
                        <option value="8">8 - Octal</option>
                        <option value="2">2 - Binary</option>
                    </select></label>
                </span>

                <span id="dissassembleOptions" style="display:none">
                    <label>Start <input id="segmentStartInput" type="text" size="5"/></label>
                    <label>Type <select id="disassembleTypeSelect">
                            <option value="exe">exe</option>
                            <option value="exe-system">exe - only system labels</option>
                            <option value="raw">raw</option>
                        </select></label>
                </span>
            </div>
            <div><textarea id="byteOutput" cols="100" rows="15" spellcheck="false"></textarea></div>
            <div>
                <label>Try Crack Key <input id="crackInput" size="28"/></label>
                <input id="tryCrackButton" type="button" value="Try"/>
                <span id="crackedKey"></span>
            </div>
        </div>
    </div>

    <div class="collapsable">
        <div class="title">Image Visualization</div>
        <div class="content">
            <div>
                <select id="imageTypeSelect">
                    <option value="texture">Wall Texture</option>
                    <option value="image-2bpp">2bpp Image</option>
                    <option value="image-1bpp">1bpp Image</option>
                    <option value="charset-2bpp">2bpp Character Set</option>
                    <option value="charset-1bpp">1bpp Character Set</option>
                </select>
                <label>Offset<input type="text" id="startOffsetInput" value="105" size="5"/></label>
                <label id="widthInputLabel">Width<input type="text" id="widthInput" value="72" size="5"/></label>
            </div>
            <div>
                Palette:
                <select id="paletteSelect">
                    <option value="5e,00,0a,24">L1.1 T1: Default / Well-lighted area</option>
                    <option value="5e,00,08,24">L1.1 T1 Z1: The City's Sewers</option>
                    <option value="5e,0e,7a,54">L1.1 T4 Z2: Goblins' demesne</option>
                    <option value="5e,22,1a,f8">L1.1 T5 Z3: Mausoleum - Acrinimiril's tomb</option>
                    <option value="5e,00,24,0a">L1.1 T1 Z5/Z6: Chapel / Gram's Gold Exchange</option>

                    <option value="5e,00,0a,06">L1.3 T1 Z2: Light wizards</option>

                    <option value="5e,00,0a,28">L1.4 T1 Z3: Cult Room</option>
                    <option value="5e,00,00,00">L1.4 T1 Z4: Dark Wizards</option>
                    <option value="5e,00,0a,04">L1.4 T1 Z8: Creepy Room</option>
                    <option value="5e,00,06,0a">L1.4 T1 Z9: Debris-littered Room</option>
                    <option value="5e,c4,ca,86">L1.4 T4 Z10: Large Room</option>
                    <option value="5e,00,1a,34">L1.4 T3 Z11: Creepy Room</option>

                    <option value="5e,7a,86,0e">L2 T5 Z1: Crystal Caverns</option>

                    <option value="5e,1a,0e,7a">L2 T5 Z4: Hall of Mirrors</option>
                    <option value="5e,c4,f8,1e">L2 T5 Z6: Musty Room</option>
                    <option value="5e,86,1a,44">L2 T5 Z7: Hall of the Adept - Blue</option>
                    <option value="5e,00,28,44">L2 T5 Z8: Hall of the Adept - Black</option>

                </select>
            </div>
            <div>
                <label>Color0 <input type="text" id="color0Input" value="5e" size="5"/></label>
                <label>Color1 <input type="text" id="color1Input" value="00" size="5"/></label>
                <label>Color2 <input type="text" id="color2Input" value="0a" size="5"/></label>
                <label>Color3 <input type="text" id="color3Input" value="34" size="5"/></label>
            </div>
            <div>
                <canvas id="imageCanvas" width="320" height="225" style="width:90%; height:30%; padding:10px; border:1px solid red;"></canvas>
            </div>
        </div>
    </div>

    <script type="module" src="file.js"></script>
</body>
</html>
