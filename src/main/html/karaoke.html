<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>arjs - Alternate Reality for the web - Karaoke test page</title>
	<link rel="icon" href="../ar-icon-48x48.png" type="image/png" sizes="48x48">
	<link rel="icon" href="../ar-icon-192x192.png" type="image/png" sizes="192x192">
	<link rel="icon" href="../ar-icon-512x512.png" type="image/png" sizes="512x512">
</head>
<body>

<div>
	<label>
	<div>Source</div>
	<select id="Source"></select>
	</label>
</div>

<style type="text/css">
@font-face {
	font-family: "AlternateRealityTheDungeon";
	src: url("/font/AlternateRealityTheDungeon.woff");
}

* {
	font-family: "AlternateRealityTheDungeon", serif
}

#Slider .Bar {
	display: inline-block;
	width: 300px;
	/*height: 1em;*/
	background-color: grey;
	margin-top: 5px;
	margin-bottom: 5px;
	cursor: pointer;
}

#Slider .Position {
	width: 5px;
	background-color: black;
	position: relative;
	cursor: pointer;
}

#Message {
	background-color: lightgray;
	display: block;
}

#Notifications {
	height: 250px;
	overflow: auto;
}

#Notifications .Notification {
	border: 1px solid gray;
	background-color: #eee;
}

#Notifications .Notification:focus {
	background-color: #bbb;
}

#Notifications .Notification span {
	display: inline-block;
	padding-left: 5px;
	padding-right: 5px;
	border-right: 1px solid gray;
	width: 75px;
	text-align: right;
}

#Notifications .Notification span.Line {
	width: 225px;
}

#Notifications .Notification span.Json {
	width: 250px;
	overflow: hidden;
	text-wrap-mode: nowrap;
}

/*
#Notifications .Notification span:last-of-type {
	text-align: left;
	border-right: none;
	width: 320px;
}
*/

.CYAN { color:cyan; }
.WHITE { color:white; }
.RED { color:red; }
.GREEN { color:green; }
.BLUE { color:blue; }
.BLACK { color:black; }
.YELLOW { color:yellow; }
.MAGENTA { color:magenta; }

</style>

<div id="Slider">
	<div class="Bar"><div class="Position">&nbsp;</div></div>
	<span class="Time"></div>
</div>

<button id="Play" disabled>Play</button>
<button id="Pause" style="display:none">Pause</button>
<button id="Stop" disabled>Stop</button>

<button id="DecreaseGain" onclick="adjustGain(-0.1)">-</button>
/
<button id="IncreaseGain" onclick="adjustGain(+0.1)">+</button>

<canvas id="Message" width="700" height="35"></canvas>

<!-- <canvas id="Visualization" width="500" height="175"></canvas> -->

<div id="Notifications"></div>

<script type="module" src="./karaoke.js"></script>

</body>
</html>
