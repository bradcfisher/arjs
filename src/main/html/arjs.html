<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>arjs - Alternate Reality for the web</title>
	<link rel="icon" href="../ar-icon-48x48.png" type="image/png" sizes="48x48">
	<link rel="icon" href="../ar-icon-192x192.png" type="image/png" sizes="192x192">
	<link rel="icon" href="../ar-icon-512x512.png" type="image/png" sizes="512x512">
</head>
<body>

<div>Tick Delay: <span id="TickDelay">?</span></div>
<div>Timestamp: <span id="Timestamp">?</span></div>
<div>Game date: <span id="GameDate">?</span></div>
<div>Date from timestamp: <span id="TimestampDate">?</span></div>
<div>Timestamp from date: <span id="DateTimestamp">?</span></div>
<div>NormalizedTime: <span id="NormalizedTime">?</span></div>
<div>Numeric date: <span id="NumericDate">?</span></div>

<div>
	<button class="GameSpeed" _speed="0">Paused</button>
	<button class="GameSpeed" _speed="1">Ultra Fast</button>
	<button class="GameSpeed" _speed="16">Fast</button>
	<button class="GameSpeed" _speed="200">Medium</button>
	<button class="GameSpeed" _speed="4000">Normal</button>
</div>

<div>Timestamp: <input type="text" id="TimestampInput"/>
	<button id="ApplyCurrentTime">Apply</button></div>

<hr/>

<div><b>Console</b></div>
<div><textarea id="Console" style="width:100%">
arjs.deserialize(arjs.serialize(gameState.hunger))
</textarea></div>
<button id="ExecuteConsoleCode">Execute</button>

<script type="module" src="./arjs.js"></script>

</body>
</html>
